<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'Segoe UI', 'Noto Sans SC', Arial, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6366f1"/><stop offset="1" stop-color="#4f46e5"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3b82f6"/><stop offset="1" stop-color="#2563eb"/></linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#10b981"/><stop offset="1" stop-color="#059669"/></linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f59e0b"/><stop offset="1" stop-color="#d97706"/></linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ef4444"/><stop offset="1" stop-color="#dc2626"/></linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arrowFilled" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#3b82f6"/>
    </marker>
  </defs>

  <rect width="1200" height="820" fill="#f8fafc" rx="8"/>
  <text x="600" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">📂 Configuration → Database Relationship</text>
  <text x="600" y="48" text-anchor="middle" font-size="12" fill="#94a3b8">How node_config.json + domain.json feed into the unified nodes table (Phase 2)</text>

  <!-- ====== COLUMN 1: CONFIG FILES ====== -->
  <text x="200" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">📁 Configuration Layer</text>

  <!-- node_config.json -->
  <rect x="40" y="100" width="320" height="270" rx="8" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="100" width="320" height="32" rx="8" fill="url(#g1)"/>
  <text x="200" y="121" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">node_config.json</text>

  <text x="55" y="152" font-size="11" font-weight="600" fill="#4338ca">node_types[]</text>
  <text x="55" y="168" font-size="10" fill="#475569">  · id / prefix / max_nodes / roles / switches</text>
  <text x="55" y="183" font-size="10" fill="#475569">  · prompt fields: order, fields[], category</text>
  <text x="55" y="198" font-size="10" fill="#475569">  · properties: has_attributes, has_inventory</text>
  <text x="55" y="213" font-size="10" fill="#475569">  · type_id (assigned by config_loader at load)</text>

  <line x1="55" y1="220" x2="345" y2="220" stroke="#c7d2fe" stroke-width="0.5"/>

  <text x="55" y="237" font-size="11" font-weight="600" fill="#4338ca">entities {}</text>
  <text x="55" y="253" font-size="10" fill="#475569">  · zones[] — id, name, capacity, connects_to</text>
  <text x="55" y="268" font-size="10" fill="#475569">  · items[] — id, name, type, connected_nodes</text>
  <text x="55" y="283" font-size="10" fill="#475569">  · npcs[] — 13 NPC definitions (full stats)</text>
  <text x="55" y="298" font-size="10" fill="#475569">  · objects[] — fixtures, furniture</text>

  <line x1="55" y1="305" x2="345" y2="305" stroke="#c7d2fe" stroke-width="0.5"/>

  <text x="55" y="322" font-size="11" font-weight="600" fill="#4338ca">world {}</text>
  <text x="55" y="338" font-size="10" fill="#475569">  · default_time, zone_connections</text>
  <text x="55" y="353" font-size="10" fill="#475569">  · allow_unregistered_entity</text>

  <line x1="55" y1="360" x2="345" y2="360" stroke="#c7d2fe" stroke-width="0.5"/>

  <text x="55" y="368" font-size="10" fill="#475569">  label_mappings — 实体名 → 拓扑字母</text>

  <!-- domain.json -->
  <rect x="40" y="390" width="320" height="200" rx="8" fill="#fef3c7" stroke="#fde68a" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="390" width="320" height="32" rx="8" fill="url(#g4)"/>
  <text x="200" y="411" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">domain.json</text>

  <text x="55" y="440" font-size="11" font-weight="600" fill="#92400e">adapter.system_role{}</text>
  <text x="55" y="456" font-size="10" fill="#475569">  · llm2, llm3, llm4a, llm5 — 各阶段系统提示</text>

  <line x1="55" y1="465" x2="345" y2="465" stroke="#fde68a" stroke-width="0.5"/>

  <text x="55" y="482" font-size="11" font-weight="600" fill="#92400e">adapter.output_format{}</text>
  <text x="55" y="498" font-size="10" fill="#475569">  · llm4a: thinking + operations JSON schema</text>
  <text x="55" y="513" font-size="10" fill="#475569">  · llm5: attr_ops + recent_info JSON schema</text>

  <line x1="55" y1="522" x2="345" y2="522" stroke="#fde68a" stroke-width="0.5"/>

  <text x="55" y="539" font-size="11" font-weight="600" fill="#92400e">adapter.* (prompt slots)</text>
  <text x="55" y="555" font-size="10" fill="#475569">  · survival_needs, entity_identity, personality</text>
  <text x="55" y="570" font-size="10" fill="#475569">  · inventory, zone_others, zone_connections</text>
  <text x="55" y="585" font-size="10" fill="#475569">  · decision_guidance, verification masks</text>

  <!-- ====== COLUMN 2: LOADER ====== -->
  <text x="600" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">⚙️ Loader Pipeline</text>

  <rect x="440" y="100" width="320" height="60" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="122" text-anchor="middle" font-size="13" fill="#0369a1" font-weight="700">config_loader.py</text>
  <text x="600" y="140" text-anchor="middle" font-size="10" fill="#475569">_load(): 解析 node_config.json → 填充全局索引</text>
  <text x="600" y="153" text-anchor="middle" font-size="10" fill="#475569">type_id 分配 · 前缀索引 · 区域连接表 · 标签映射</text>

  <path d="M360,235 L440,235" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <rect x="440" y="215" width="320" height="100" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1" filter="url(#shadow)"/>
  <text x="600" y="237" text-anchor="middle" font-size="13" fill="#0369a1" font-weight="700">NodeDB._seed_from_config()</text>
  <text x="600" y="255" text-anchor="middle" font-size="10" fill="#475569">从 config 播种所有实体到 nodes 表</text>
  <text x="455" y="272" font-size="10" fill="#475569">1. 遍历 create_diverse_npcs() → npc_to_node_dict() → upsert</text>
  <text x="455" y="287" font-size="10" fill="#475569">2. get_zones() + build_zone_model_full() → upsert</text>
  <text x="455" y="302" font-size="10" fill="#475569">3. get_items() / _get_config_recipes() → upsert</text>

  <path d="M360,490 L440,490" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowFilled)" stroke-dasharray="5,3"/>
  <text x="400" y="480" text-anchor="middle" font-size="9" fill="#f59e0b">domain.json</text>

  <rect x="440" y="390" width="320" height="140" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="1" filter="url(#shadow)"/>
  <text x="600" y="412" text-anchor="middle" font-size="13" fill="#0369a1" font-weight="700">DomainAdapter (npc_world)</text>
  <text x="600" y="430" text-anchor="middle" font-size="10" fill="#475569">render_slot()：读取 domain.json 的 prompt 槽</text>
  <text x="455" y="448" font-size="10" fill="#475569">· prompt_assembler.assemble() — 按 LLM 阶段组装</text>
  <text x="455" y="463" font-size="10" fill="#475569">· 每个 slot 有 provider (content/runtime/topology)</text>
  <text x="455" y="478" font-size="10" fill="#475569">· 运行时插入: 世界时间, 图拓扑, 标签映射</text>
  <text x="455" y="493" font-size="10" fill="#475569">· 翻译层: 抽象字母 → 自然语言描述</text>
  <text x="455" y="508" font-size="10" fill="#475569">· 校验掩码: 控制 6 项校验的启用/禁用</text>

  <rect x="440" y="555" width="320" height="40" rx="8" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1" filter="url(#shadow)"/>
  <text x="600" y="572" text-anchor="middle" font-size="12" fill="#be185d" font-weight="700">DB Node ↔ NPC Model</text>
  <text x="600" y="587" text-anchor="middle" font-size="10" fill="#475569">converters.py: node_to_npc() / npc_to_node_dict()</text>

  <!-- ====== COLUMN 3: DB ====== -->
  <text x="970" y="80" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">💾 Persistence Layer</text>

  <!-- DB schema -->
  <rect x="840" y="100" width="320" height="130" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="840" y="100" width="320" height="32" rx="8" fill="url(#g3)"/>
  <text x="1000" y="121" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">SQLite — nodes 表</text>

  <text x="855" y="155" font-size="11" font-weight="600" fill="#166534">Single table schema:</text>
  <text x="855" y="172" font-size="10" fill="#475569">CREATE TABLE nodes (</text>
  <text x="865" y="187" font-size="10" fill="#475569">id TEXT PRIMARY KEY,       -- "npc_杰洛特" / "zone_白果园"</text>
  <text x="865" y="202" font-size="10" fill="#475569">type TEXT NOT NULL,        -- "npc" / "zone" / "item" / "recipe" / "object"</text>
  <text x="865" y="217" font-size="10" fill="#475569">name TEXT NOT NULL,        -- "杰洛特" / "白果园"</text>
  <text x="865" y="232" font-size="10" fill="#475569">data TEXT NOT NULL,        -- JSON: 所有属性/库存/关系</text>
  <text x="855" y="247" font-size="10" fill="#475569">created_at, updated_at TEXT</text>
  <text x="855" y="262" font-size="10" fill="#475569">);</text>

  <line x1="360" y1="135" x2="440" y2="135" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <line x1="360" y1="155" x2="440" y2="155" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <line x1="360" y1="175" x2="440" y2="175" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowFilled)"/>

  <!-- DB ↔ Engine -->
  <rect x="840" y="250" width="320" height="100" rx="8" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1000" y="272" text-anchor="middle" font-size="13" fill="#6d28d9" font-weight="700">Seed Data (38 nodes)</text>
  <text x="855" y="290" font-size="11" fill="#475569">13× NPC zone_records</text>
  <text x="855" y="305" font-size="11" fill="#475569"> 7× Zone definitions</text>
  <text x="855" y="320" font-size="11" fill="#475569">11× Item definitions</text>
  <text x="855" y="335" font-size="11" fill="#475569"> 6× Recipe definitions</text>
  <text x="855" y="350" font-size="11" fill="#475569"> 1× System node (world_time)</text>

  <path d="M600,315 L840,315" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowFilled)"/>

  <!-- Runtime sync -->
  <rect x="840" y="370" width="320" height="130" rx="8" fill="#fce7f3" stroke="#f9a8d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1000" y="392" text-anchor="middle" font-size="13" fill="#be185d" font-weight="700">Runtime Persistence Flow</text>

  <text x="855" y="412" font-size="10" fill="#475569">1. load_or_seed() → DB → GraphEngine</text>
  <text x="855" y="430" font-size="10" fill="#475569">   (从 nodes 表构建运行时图)</text>
  <text x="855" y="450" font-size="10" fill="#475569">2. sync_graph_to_nodes() → Graph → DB</text>
  <text x="855" y="468" font-size="10" fill="#475569">   (tick 结束后所有实体状态写回)</text>
  <text x="855" y="488" font-size="10" fill="#475569">3. _on_graph_entity_created() — LLM 创建</text>

  <path d="M600,440 L840,440" stroke="#ec4899" stroke-width="1.5" marker-end="url(#arrowFilled)"/>

  <!-- Engine data model -->
  <rect x="840" y="520" width="320" height="120" rx="8" fill="#fefce8" stroke="#fde047" stroke-width="1" filter="url(#shadow)"/>
  <text x="1000" y="542" text-anchor="middle" font-size="13" fill="#a16207" font-weight="700">GraphEngine Data Model</text>

  <text x="855" y="560" font-size="10" fill="#475569">· Entity → node in GraphEngine, edges=[(tgt, qty, ...)]</text>
  <text x="855" y="578" font-size="10" fill="#475569">· 边类型: npc_zone / zone_zone / npc_item / zone_item</text>
  <text x="855" y="596" font-size="10" fill="#475569">· supply_view(entity_id) → {item: total_qty} (递归库存汇总)</text>
  <text x="855" y="614" font-size="10" fill="#475569">· build_components() → BFS 连通分量 (用于并行管线)</text>
  <text x="855" y="632" font-size="10" fill="#475569">· entity_to_node_dict() → 运行时状态序列化回 DB 格式</text>

  <path d="M600,590 L840,590" stroke="#eab308" stroke-width="1.5" marker-end="url(#arrowFilled)"/>

  <!-- ====== BOTTOM: DATA FLOW LEGEND ====== -->
  <rect x="40" y="640" width="1120" height="160" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="600" y="660" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Data Flow: How Entities Flow from Config to DB to Engine</text>

  <!-- Flow path -->
  <path d="M100,700 L100,710 L152,710" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <path d="M200,700 L200,710 L252,710" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <path d="M300,700 L300,710 L352,710" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <path d="M400,700 L400,710 L452,710" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <path d="M700,700 L700,710 L752,710" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowFilled)"/>
  <path d="M850,700 L850,710" stroke="#64748b" stroke-width="1.5"/>

  <rect x="100" y="685" width="55" height="30" rx="6" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="127" y="704" text-anchor="middle" font-size="10" fill="#1e40af">config/</text>

  <rect x="200" y="685" width="55" height="30" rx="6" fill="#e0f2fe" stroke="#38bdf8"/>
  <text x="227" y="704" text-anchor="middle" font-size="10" fill="#0369a1">_seed</text>

  <rect x="300" y="685" width="55" height="30" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="327" y="704" text-anchor="middle" font-size="10" fill="#166534">nodes</text>

  <rect x="400" y="685" width="55" height="30" rx="6" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="427" y="704" text-anchor="middle" font-size="10" fill="#4338ca">load</text>

  <rect x="500" y="685" width="180" height="30" rx="6" fill="#f5f5f5" stroke="#94a3b8" stroke-dasharray="3,2"/>
  <text x="590" y="704" text-anchor="middle" font-size="10" fill="#475569">GraphEngine (runtime graph)</text>

  <rect x="700" y="685" width="55" height="30" rx="6" fill="#faf5ff" stroke="#c4b5fd"/>
  <text x="727" y="704" text-anchor="middle" font-size="10" fill="#6d28d9">sync</text>

  <rect x="800" y="685" width="55" height="30" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="827" y="704" text-anchor="middle" font-size="10" fill="#166534">nodes</text>

  <path d="M127,715 L127,745" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowFilled)"/>

  <!-- Bottom detail -->
  <rect x="40" y="720" width="1120" height="65" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="740" font-size="11" font-weight="600" fill="#334155">Key Takeaway</text>
  <text x="60" y="757" font-size="10" fill="#64748b">config/ 只读取一次（首次运行或 DB 为空时）→ seed 到 nodes 表。后续所有 tick 从 DB 加载 → 运行时 GraphEngine 修改</text>
  <text x="60" y="772" font-size="10" fill="#64748b">→ tick 结束 sync_graph_to_nodes() 写回 DB。DB 是唯一数据源——config 不参与运行时，只做初始定义。</text>
</svg>